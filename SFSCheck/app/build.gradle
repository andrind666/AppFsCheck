plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {

    namespace 'com.sfscheck'

    compileSdk 35

    defaultConfig {

        applicationId "com.sfscheck"

        minSdk 24
        targetSdk 35

        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters \
                'arm64-v8a',
                'armeabi-v7a',
                'x86',
                'x86_64'
        }
    }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    splits {
        abi {
            enable false
        }
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {

    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
